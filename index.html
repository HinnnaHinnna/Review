<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다른 방식으로 읽기</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="top">
    <div class="top-inner">
      <h1 class="site-title">
        <a href="#/">다른 방식으로 읽기</a>
      </h1>

      <nav class="top-nav">
        <button type="button" class="nav-btn" data-nav="recent">최근</button>
        <button type="button" class="nav-btn" data-nav="search">검색</button>
        <button type="button" class="nav-btn" data-nav="new" id="new-btn">새 문서</button>

        <span class="auth-pill" id="auth-status">읽기 모드</span>
        <button type="button" class="nav-btn" id="auth-btn">로그인</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <aside class="side" aria-label="문서 목록">
      <div class="side-head">
        <div class="side-title">문서</div>
        <div class="side-hint">클릭해서 열기</div>
      </div>

      <div class="side-filters" id="category-chips"></div>

      <div class="side-search">
        <input id="side-search-input" type="text" placeholder="목록에서 찾기..." />
      </div>

      <ul class="page-list" id="page-list"></ul>
    </aside>

    <section class="content" aria-label="문서 내용">
      <div id="view"></div>
    </section>
  </main>

  <!-- OCR 라이브러리 -->
  <!--
    이 스크립트가 window.Tesseract 를 만들어 줌.
    script.js 에서 이 전역 객체를 사용해 OCR worker를 생성할 거야.
  -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script src="projects-data.js"></script>
  <script type="module" src="script.js"></script>
</body>

</html>
