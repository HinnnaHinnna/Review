<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Wiki</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="top">
    <div class="top-inner">
      <h1 class="site-title">
        <a href="#/">Review</a>
      </h1>

      <nav class="top-nav">
        <button type="button" class="nav-btn" data-nav="recent">최근</button>
        <button type="button" class="nav-btn" data-nav="search">검색</button>
        <button type="button" class="nav-btn" data-nav="new" id="new-btn">새 문서</button>

        <span class="auth-pill" id="auth-status">읽기 모드</span>
        <button type="button" class="nav-btn" id="auth-btn">로그인</button>
      </nav>
    </div>
  </header>

  <main class="layout">
    <aside class="side" aria-label="문서 목록">
      <div class="side-head">
        <div class="side-title">문서</div>
        <div class="side-hint">클릭해서 열기</div>
      </div>

      <div class="side-filters">
        <button type="button" class="chip is-active" data-filter="all">전체</button>
        <button type="button" class="chip" data-filter="exhibition">전시</button>
        <button type="button" class="chip" data-filter="book">책</button>
        <button type="button" class="chip" data-filter="note">노트</button>
      </div>

      <div class="side-search">
        <input id="side-search-input" type="text" placeholder="목록에서 찾기..." />
      </div>

      <ul class="page-list" id="page-list"></ul>
    </aside>

    <section class="content" aria-label="문서 내용">
      <div id="view"></div>
    </section>
  </main>

  <script src="projects-data.js"></script>
  <!-- Firebase 모듈 import를 쓰기 때문에 module -->
  <script type="module" src="script.js"></script>
</body>

</html>
